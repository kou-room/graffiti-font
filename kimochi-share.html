<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>気分シェア</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f; min-height: 100vh;
      font-family: -apple-system, sans-serif; color: #fff;
    }

    .header {
      text-align: center; padding: 32px 20px 16px;
      border-bottom: 1px solid #1e1e1e;
    }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
    .header p { font-size: 11px; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }

    /* 自分の設定 */
    .my-section {
      padding: 20px;
      border-bottom: 1px solid #1e1e1e;
    }
    .my-label { font-size: 10px; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 12px; }

    .name-input {
      width: 100%; background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 8px; color: #fff; font-size: 15px;
      padding: 12px 14px; outline: none; margin-bottom: 14px;
    }
    .name-input::placeholder { color: #333; }
    .name-input:focus { border-color: #444; }

    /* 気分選択 */
    .mood-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
      margin-bottom: 14px;
    }
    .mood-btn {
      background: #1a1a1a; border: 2px solid #2a2a2a; border-radius: 12px;
      padding: 14px 8px; text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .mood-btn:active { transform: scale(0.95); }
    .mood-btn.selected { border-color: #fff; background: #2a2a2a; }
    .mood-emoji { font-size: 28px; display: block; margin-bottom: 4px; }
    .mood-label { font-size: 11px; color: #888; }
    .mood-btn.selected .mood-label { color: #fff; }

    .share-btn {
      width: 100%; padding: 14px; background: #fff; color: #000;
      border: none; border-radius: 10px; font-size: 13px; font-weight: 700;
      letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
    }
    .share-btn:active { background: #ccc; }
    .share-btn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; }

    /* みんなの気分 */
    .friends-section { padding: 20px; }
    .friends-label { font-size: 10px; color: #555; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px; }

    .friend-card {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
      padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px;
    }
    .friend-emoji { font-size: 36px; }
    .friend-info { flex: 1; }
    .friend-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .friend-mood { font-size: 12px; color: #888; }
    .friend-time { font-size: 10px; color: #444; margin-top: 2px; }

    .empty-msg { text-align: center; color: #333; font-size: 13px; padding: 32px 0; }

    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a1a1a; color: #fff; padding: 10px 20px;
      border-radius: 8px; font-size: 12px; border: 1px solid #333;
      opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <h1>気分シェア 🌀</h1>
  <p>Kimochi Share</p>
</div>

<div class="my-section">
  <div class="my-label">あなたの名前と気分</div>
  <input class="name-input" id="nameInput" placeholder="名前を入力..." maxlength="10">

  <div class="mood-grid">
    <div class="mood-btn" onclick="selectMood('遊びたい', '🎮')">
      <span class="mood-emoji">🎮</span>
      <span class="mood-label">遊びたい</span>
    </div>
    <div class="mood-btn" onclick="selectMood('暇！', '👀')">
      <span class="mood-emoji">👀</span>
      <span class="mood-label">暇！</span>
    </div>
    <div class="mood-btn" onclick="selectMood('寂しい', '🥺')">
      <span class="mood-emoji">🥺</span>
      <span class="mood-label">寂しい</span>
    </div>
    <div class="mood-btn" onclick="selectMood('調子悪い', '😞')">
      <span class="mood-emoji">😞</span>
      <span class="mood-label">調子悪い</span>
    </div>
    <div class="mood-btn" onclick="selectMood('元気！', '🔥')">
      <span class="mood-emoji">🔥</span>
      <span class="mood-label">元気！</span>
    </div>
    <div class="mood-btn" onclick="selectMood('眠い…', '😴')">
      <span class="mood-emoji">😴</span>
      <span class="mood-label">眠い…</span>
    </div>
    <div class="mood-btn" onclick="selectMood('ごはん行きたい', '🍜')">
      <span class="mood-emoji">🍜</span>
      <span class="mood-label">ごはん行きたい</span>
    </div>
    <div class="mood-btn" onclick="selectMood('仕事中', '💼')">
      <span class="mood-emoji">💼</span>
      <span class="mood-label">仕事中</span>
    </div>
    <div class="mood-btn" onclick="selectMood('連絡して', '📱')">
      <span class="mood-emoji">📱</span>
      <span class="mood-label">連絡して</span>
    </div>
  </div>

  <button class="share-btn" id="shareBtn" onclick="shareMood()" disabled>気分をシェア！</button>
</div>

<div class="friends-section">
  <div class="friends-label">みんなの気分</div>
  <div id="friendsList"><div class="empty-msg">読み込み中...</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBE5QU_9X4laOjCLIuXUqj3Z8O-rfW3D-M",
    authDomain: "kimochi-share.firebaseapp.com",
    databaseURL: "https://kimochi-share-default-rtdb.firebaseio.com",
    projectId: "kimochi-share",
    storageBucket: "kimochi-share.firebasestorage.app",
    messagingSenderId: "957226642091",
    appId: "1:957226642091:web:b3e57f7330e9ba8fd525ee",
    measurementId: "G-E3PY3WEL1G"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let selectedMood = '';
  let selectedEmoji = '';

  window.selectMood = function(mood, emoji) {
    selectedMood = mood;
    selectedEmoji = emoji;
    document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    checkShareBtn();
  };

  document.getElementById('nameInput').addEventListener('input', checkShareBtn);

  function checkShareBtn() {
    const name = document.getElementById('nameInput').value.trim();
    document.getElementById('shareBtn').disabled = !(name && selectedMood);
  }

  window.shareMood = async function() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name || !selectedMood) return;

    try {
      await set(ref(db, 'moods/' + name), {
        name: name,
        mood: selectedMood,
        emoji: selectedEmoji,
        timestamp: Date.now()
      });
      showToast('シェアしました！');
    } catch(e) {
      showToast('エラーが発生しました');
    }
  };

  // リアルタイム更新
  onValue(ref(db, 'moods'), (snapshot) => {
    const data = snapshot.val();
    const list = document.getElementById('friendsList');

    if (!data) {
      list.innerHTML = '<div class="empty-msg">まだ誰もいません👀<br>最初にシェアしよう！</div>';
      return;
    }

    const entries = Object.values(data).sort((a, b) => b.timestamp - a.timestamp);

    list.innerHTML = entries.map(entry => {
      const mins = Math.floor((Date.now() - entry.timestamp) / 60000);
      const timeStr = mins < 1 ? 'たった今' : mins < 60 ? mins + '分前' : Math.floor(mins/60) + '時間前';
      return `
        <div class="friend-card">
          <div class="friend-emoji">${entry.emoji}</div>
          <div class="friend-info">
            <div class="friend-name">${entry.name}</div>
            <div class="friend-mood">${entry.mood}</div>
            <div class="friend-time">${timeStr}</div>
          </div>
        </div>
      `;
    }).join('');
  });

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
